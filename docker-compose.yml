version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: maryan_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maryan_fashion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: maryan_api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/maryan_fashion?schema=public
      - JWT_SECRET=maryan-secret-key-2026
    depends_on:
      - postgres

volumes:
  pgdata:
